<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Незнакомка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            display: block;
        }

        /* на совсем маленьких экранах чуть отступы по бокам, если нужно */
        @media (max-width: 768px) {
            img {
                object-fit: contain;
            }
        }
    </style>
</head>
<body>
    <!-- ВСТАВЬТЕ СЮДА ВАШУ ПРЯМУЮ ССЫЛКУ С GITHUB -->
    <img src="https://github.com/PevelUKR/easycontrolsystems/blob/main/Rest.jpeg">
</body>
</html>
