<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>В разработке</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;  /* тёмный фон как в музее */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        /* контейнер с одной картинкой */
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        img {
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        /* опционально — маленькая подпись в углу, но её почти не видно */
        .corner-note {
            position: fixed;
            bottom: 12px;
            right: 16px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 20px;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <!-- ПРЯМАЯ ССЫЛКА НА НЕЗНАКОМКУ КРАМСКОГО (качественное изображение) -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Kramskoy_Stranger.jpg/1200px-Kramskoy_Stranger.jpg" 
             alt="Незнакомка Крамского"
             title="Сайт в разработке">
    </div>

    <!-- совсем незаметная метка, чтобы помнить, что это за место -->
    <div class="corner-note">
        телемеханика / диспетчеризация
    </div>
</body>
</html>
